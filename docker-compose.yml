services:
  spse:
    build: .
    ports:
      - "5001:5000"
    volumes:
      # Persist graph.db and corpus files between container restarts
      - ./data:/app/data
    environment:
      PORT: "5000"
    restart: unless-stopped
    # ── GPU passthrough (requires NVIDIA Container Toolkit on the host) ────────
    # If no GPU is present, Docker ignores this block gracefully — CPU is used.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
